services:

  # ── Tier 3: Data ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voilee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voilee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voilee_secret}
      POSTGRES_DB: ${POSTGRES_DB:-voilee}
    volumes:
      - voilee_pg_data:/var/lib/postgresql/data
    networks:
      - backend_net
      - dev_access
    expose:
      - "5432"
    # Lokal geliştirme için host'a port aç (dev_access üzerinden)
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voilee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tier 2: Application ───────────────────────────────────────────────────────
  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voilee-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # 3 katmanlı mimaride statik dosya servisi Nginx'e bırakılır
      SERVE_STATIC: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-voilee}:${POSTGRES_PASSWORD:-voilee_secret}@postgres:5432/${POSTGRES_DB:-voilee}
      UPLOADS_DIR: /app/uploads
    volumes:
      - voilee_uploads:/app/uploads
    networks:
      - backend_net
      - frontend_net
    # Node dış dünyaya kapalı — sadece Nginx üzerinden erişilir
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Tier 1: Presentation ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: voilee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # HTTPS için: "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Build edilmiş frontend dosyaları buraya mount edilir
      - ./dist/public:/usr/share/nginx/html:ro
      # Kullanıcı tarafından yüklenen görseller (Node ile paylaşılan volume)
      - voilee_uploads:/usr/share/nginx/uploads:ro
    networks:
      - frontend_net
    depends_on:
      - node

networks:
  # Backend iç ağ: postgres ↔ node (dış erişim yok)
  backend_net:
    driver: bridge
    internal: true
  # Frontend ağ: nginx ↔ node
  frontend_net:
    driver: bridge
  # Lokal geliştirme: host'tan postgres'e erişim için
  dev_access:
    driver: bridge

volumes:
  voilee_pg_data:
  voilee_uploads:
