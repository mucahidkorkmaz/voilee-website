services:

  # ── Tier 3: Data ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voilee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voilee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voilee_secret}
      POSTGRES_DB: ${POSTGRES_DB:-voilee}
    volumes:
      - voilee_pg_data:/var/lib/postgresql/data
    networks:
      - backend_net
      - dev_access
    expose:
      - "5432"
    # Lokal geliştirme için host'a port aç (dev_access üzerinden)
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voilee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Tier 2: Application ───────────────────────────────────────────────────────
  node:
    image: mucahidkorkmaz/voilee-website:v2.3
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Her build'de cache kırılır — eski katmanlar yeniden kullanılmaz
        BUILD_DATE: ${BUILD_DATE:-}
    container_name: voilee-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SERVE_STATIC: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-voilee}:${POSTGRES_PASSWORD:-voilee_secret}@postgres:5432/${POSTGRES_DB:-voilee}
      UPLOADS_DIR: /app/uploads
    volumes:
      - voilee_uploads:/app/uploads
      # Image içindeki build edilmiş frontend dosyalarını named volume'a kopyala
      - voilee_frontend:/app/dist/public
    networks:
      - backend_net
      - frontend_net
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend dosya kopyalayıcı (one-shot) ─────────────────────────────────────
  # Her deploy'da image içindeki dist/public'i nginx'in okuyacağı volume'a kopyalar
  frontend-sync:
    image: mucahidkorkmaz/voilee-website:v2.3
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
    container_name: voilee-frontend-sync
    restart: "no"
    entrypoint: ["sh", "-c", "cp -r /app/dist/public/. /frontend/ && echo 'Frontend sync done'"]
    volumes:
      - voilee_frontend:/frontend
    networks:
      - frontend_net

  # ── Tier 1: Presentation ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: voilee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # HTTPS için: "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Image'dan sync edilen frontend dosyaları (host'a bağımlı değil)
      - voilee_frontend:/usr/share/nginx/html:ro
      - voilee_uploads:/usr/share/nginx/uploads:ro
    networks:
      - frontend_net
    depends_on:
      - node
      - frontend-sync

networks:
  # Backend iç ağ: postgres ↔ node (dış erişim yok)
  backend_net:
    driver: bridge
    internal: true
  # Frontend ağ: nginx ↔ node
  frontend_net:
    driver: bridge
  # Lokal geliştirme: host'tan postgres'e erişim için
  dev_access:
    driver: bridge

volumes:
  voilee_pg_data:
  voilee_uploads:
  voilee_frontend:
