upstream api_backend {
    server node:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Sunucu bilgilerini gizle
    server_tokens off;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml font/truetype font/opentype
               image/svg+xml;

    # ── Tier 1: Presentation (React SPA statik dosyaları) ─────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Statik varlıklar — uzun süre cache'le (içerik hash'li)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Kullanıcı yüklemeleri — doğrudan statik olarak sun ─────────────────────
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Tier 2: Application (tüm API isteklerini Node.js'e yönlendir) ──────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Büyük yüklemeler için timeout
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;

        # Upload boyutu limiti (backend ile uyumlu)
        client_max_body_size 55m;
    }

    # Eski mağaza URL'leri → yeni silüet rotaları (301)
    location = /koleksiyonlar { return 301 /siluetler; }
    location = /en/collections { return 301 /en/silhouettes; }
    location = /ar/collections { return 301 /ar/silhouettes; }
    location = /tr/collections { return 301 /siluetler; }

    # SPA routing — tüm bilinmeyen rotalar index.html'e gider
    location / {
        try_files $uri $uri/ /index.html;
    }
}
